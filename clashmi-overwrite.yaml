# ※※※※※※※※※※※※※※※ 锚点区域 ※※※※※※※※※※※※※※※
# ① 订阅锚点
Anchor_PR: &Anchor_PR
  type: http
  interval: 86400
  proxy: DIRECT
  health-check:
    enable: true
    url: "https://www.g.cn/generate_204"
    interval: 300
  filter: "^(?!.*(到期|过期|剩余|网址|官网|邮箱|订阅|套餐|流量|说明|重置)).*$"

# ② 出站锚点（按新代理组关联）
Anchor_OB: &Anchor_OB
  type: select
  proxies:
    - PROXY
    - ⚡ Auto-Fallback
    - 🔀 Load-Balance
    - 🇭🇰HK-AUTO
    - 🇨🇳TW-AUTO
    - 🇸🇬SG-AUTO
    - 🇯🇵JP-AUTO
    - 🇺🇸US-AUTO
    - 🇰🇷KR-AUTO
    - 🇨🇦CA-AUTO
    - 🇬🇧GB-AUTO
    - 🇩🇪DE-AUTO
    - 🇫🇷FR-AUTO
    - OTHER-AUTO
    - DIRECT
    - REJECT

# ③ 策略锚点（保留）
Anchor_HS: &Anchor_HS { type: select, include-all: true }
Anchor_FB: &Anchor_FB
  type: fallback
  url: "https://www.g.cn/generate_204"
  interval: 300
  lazy: false
  timeout: 2000
  max-failed-times: 3
  hidden: true
Anchor_UT: &Anchor_UT
  type: url-test
  url: "https://www.g.cn/generate_204"
  interval: 300
  lazy: false
  tolerance: 50
  timeout: 2000
  max-failed-times: 3
  hidden: true
  include-all: true

# ④ 区域锚点（保留）
Anchor_HK: &Anchor_HK "^(?i)(?=.*(香港|🇭🇰|\\bHK\\b|Hong(?:\\s?Kong)?|HKG)).*$"
Anchor_TW: &Anchor_TW "^(?i)(?=.*(台湾|台灣|🇹🇼|\\bTW\\b|\\bTPE\\b|\\bTSA\\b|\\bKHH\\b|taiwan|TPE|TSA|KHH)).*$"
Anchor_JP: &Anchor_JP "^(?i)(?=.*(日本|🇯🇵|\\bJP\\b|Japan|NRT|HND|KIX|CTS|FUK)).*$"
Anchor_KR: &Anchor_KR "^(?i)(?=.*(韩国|韓國|🇰🇷|首尔|首爾|\\bKR\\b|\\bKOR\\b|Korea|Seoul|South)).*$"
Anchor_SG: &Anchor_SG "^(?i)(?=.*(新加坡|🇸🇬|\\bSG\\b|Singapore|SIN|XSP)).*$"
Anchor_US: &Anchor_US "^(?i)(?=.*(美国|美國|🇺🇸|\\bUS\\b|\\bUSA\\b|SJC|JFK|LAX|ORD|ATL|DFW|SFO|MIA|SEA|IAD)).*$"
Anchor_EU: &Anchor_EU "^(?i)(?=.*(奥地利|奥地利共和国|比利时|保加利亚|克罗地亚|塞浦路斯|捷克|丹麦|爱沙尼亚|芬兰|法国|德国|希腊|匈牙利|爱尔兰|意大利|拉脱维亚|立陶宛|卢森堡|荷兰|波兰|葡萄牙|罗马尼亚|斯洛伐克|斯洛文尼亚|西班牙|瑞典|英国|🇧🇪|🇨🇿|🇩🇰|🇫🇮|🇫🇷|🇩🇪|🇮🇪|🇮🇹|🇱🇹|🇱🇺|🇳🇱|🇵🇱|🇸🇪|🇬🇧|CDG|FRA|AMS|MAD|BCN|FCO|MUC|BRU)).*$"
Anchor_OT: &Anchor_OT "^(?!.*(DIRECT|直接连接|香港|台湾|台灣|日本|韩国|韓國|新加坡|美国|美國|奥地利|比利时|保加利亚|克罗地亚|塞浦路斯|捷克|丹麦|爱沙尼亚|芬兰|法国|德国|希腊|匈牙利|爱尔兰|意大利|拉脱维亚|立陶宛|卢森堡|荷兰|波兰|葡萄牙|罗马尼亚|斯洛伐克|斯洛文尼亚|西班牙|瑞典|英国|🇭🇰|🇹🇼|🇸🇬|🇯🇵|🇰🇷|🇺🇸|🇬🇧|HK|TW|SG|JP|KR|US|GB|CDG|FRA|AMS|MAD|BCN|FCO|MUC|BRU|HKG|TPE|TSA|KHH|SIN|XSP|NRT|HND|KIX|CTS|FUK|JFK|LAX|ORD|ATL|DFW|SFO|MIA|SEA|IAD|LHR|LGW)).*$"

# ⑤ 规则锚点
Anchor_IP: &Anchor_IP { type: http, interval: 86400, behavior: ipcidr, format: mrs }
Anchor_DN: &Anchor_DN { type: http, interval: 86400, behavior: domain, format: mrs }
Anchor_CL: &Anchor_CL { type: http, interval: 86400, behavior: classical, format: text }

# ※※※※※※※※※※※※※※※ 核心配置 ※※※※※※※※※※※※※※※
mixed-port: 7893
mode: rule
allow-lan: true
bind-address: "*"
tcp-concurrent: true
unified-delay: true
log-level: info
ipv6: true

profile:
  store-selected: true
  store-fake-ip: true

# 管理面板
external-ui-name: zashboard
external-ui: ui
external-controller: 0.0.0.0:9090
secret: ""
external-ui-url: https://github.com/Zephyruso/zashboard/releases/latest/download/dist-no-fonts.zip

# TUN配置
tun:
  enable: true
  stack: system
  dns-hijack: [0.0.0.0:53]
  auto-detect-interface: true
  auto-route: true
  auto-redirect: true
  strict-route: false
  endpoint-independent-nat: true

# 嗅探功能
sniffer:
  enable: true
  override-destination: true
  parse-pure-ip: true
  force-dns-mapping: true
  sniff:
    QUIC:
      ports: [443]
    TLS:
      ports: [443, 8443]
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
  force-domain:
    - "+.netflix.com"
    - "+.nflxvideo.net"
    - "+.amazonaws.com"
    - "+.media.dssott.com"
  skip-domain:
    - "+.apple.com"
    - Mijia Cloud
    - dlg.io.mi.com
    - "+.oray.com"
    - "+.sunlogin.net"
    - "+.push.apple.com"

# DNS 设置
dns:
  enable: true
  listen: 0.0.0.0:7874
  ipv6: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: blacklist
  respect-rules: false
  fake-ip-filter:
    - "*.lan"
    - "rule-set:cn_domain"
  default-nameserver:
    - 114.114.114.114
    - tls://223.5.5.5:853
  nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query

# ※※※※※※※※※※※※※※※ 代理策略组（已按JS样式改） ※※※※※※※※※※※※※※※
proxy-groups:
  - name: PROXY
    type: select
    proxies:
      - ⚡ Auto-Fallback
      - 🔀 Load-Balance
      - 🇭🇰HK-AUTO
      - 🇨🇳TW-AUTO
      - 🇸🇬SG-AUTO
      - 🇯🇵JP-AUTO
      - 🇺🇸US-AUTO
      - 🇰🇷KR-AUTO
      - 🇨🇦CA-AUTO
      - 🇬🇧GB-AUTO
      - 🇩🇪DE-AUTO
      - 🇫🇷FR-AUTO
      - OTHER-AUTO
      - DIRECT
      - REJECT

  - name: ⚡ Auto-Fallback
    type: fallback
    url: "http://www.google.com/generate_204"
    interval: 600
    proxies:
      - 🇭🇰HK-AUTO
      - 🇨🇳TW-AUTO
      - 🇸🇬SG-AUTO
      - 🇯🇵JP-AUTO
      - 🇺🇸US-AUTO
      - 🇰🇷KR-AUTO
      - 🇨🇦CA-AUTO
      - 🇬🇧GB-AUTO
      - 🇩🇪DE-AUTO
      - 🇫🇷FR-AUTO
      - OTHER-AUTO

  - name: 🔀 Load-Balance
    type: load-balance
    url: "http://www.google.com/generate_204"
    interval: 600
    strategy: consistent-hashing
    proxies:
      - 🇭🇰HK-AUTO
      - 🇨🇳TW-AUTO
      - 🇸🇬SG-AUTO
      - 🇯🇵JP-AUTO
      - 🇺🇸US-AUTO
      - 🇰🇷KR-AUTO
      - 🇨🇦CA-AUTO
      - 🇬🇧GB-AUTO
      - 🇩🇪DE-AUTO
      - 🇫🇷FR-AUTO
      - OTHER-AUTO

  - { name: 🇭🇰HK-AUTO, type: url-test, url: "http://www.google.com/generate_204", interval: 600, tolerance: 80, include-all: true, filter: "^(?!.*(Traffic|Expire|过期|流量|剩余|重置|到期|套餐|\\d+\\s?(GB|TB|MB)|Days?\\s?Left)).*(?i)(hong\\s?kong|香港|hk|🇭🇰).*" }
  - { name: 🇨🇳TW-AUTO, type: url-test, url: "http://www.google.com/generate_204", interval: 600, tolerance: 80, include-all: true, filter: "^(?!.*(Traffic|Expire|过期|流量|剩余|重置|到期|套餐|\\d+\\s?(GB|TB|MB)|Days?\\s?Left)).*(?i)(taiwan|台湾|tw|🇹🇼).*" }
  - { name: 🇸🇬SG-AUTO, type: url-test, url: "http://www.google.com/generate_204", interval: 600, tolerance: 80, include-all: true, filter: "^(?!.*(Traffic|Expire|过期|流量|剩余|重置|到期|套餐|\\d+\\s?(GB|TB|MB)|Days?\\s?Left)).*(?i)(singapore|新加坡|狮城|sg|🇸🇬).*" }
  - { name: 🇯🇵JP-AUTO, type: url-test, url: "http://www.google.com/generate_204", interval: 600, tolerance: 80, include-all: true, filter: "^(?!.*(Traffic|Expire|过期|流量|剩余|重置|到期|套餐|\\d+\\s?(GB|TB|MB)|Days?\\s?Left)).*(?i)(japan|日本|jp|🇯🇵).*" }
  - { name: 🇺🇸US-AUTO, type: url-test, url: "http://www.google.com/generate_204", interval: 600, tolerance: 80, include-all: true, filter: "^(?!.*(Traffic|Expire|过期|流量|剩余|重置|到期|套餐|\\d+\\s?(GB|TB|MB)|Days?\\s?Left)).*(?i)(united\\s?states|美国|us|🇺🇸).*" }
  - { name: 🇰🇷KR-AUTO, type: url-test, url: "http://www.google.com/generate_204", interval: 600, tolerance: 80, include-all: true, filter: "^(?!.*(Traffic|Expire|过期|流量|剩余|重置|到期|套餐|\\d+\\s?(GB|TB|MB)|Days?\\s?Left)).*(?i)(korea|韩国|south\\s?korea|kr|🇰🇷).*" }
  - { name: 🇨🇦CA-AUTO, type: url-test, url: "http://www.google.com/generate_204", interval: 600, tolerance: 80, include-all: true, filter: "^(?!.*(Traffic|Expire|过期|流量|剩余|重置|到期|套餐|\\d+\\s?(GB|TB|MB)|Days?\\s?Left)).*(?i)(canada|加拿大|ca|🇨🇦).*" }
  - { name: 🇬🇧GB-AUTO, type: url-test, url: "http://www.google.com/generate_204", interval: 600, tolerance: 80, include-all: true, filter: "^(?!.*(Traffic|Expire|过期|流量|剩余|重置|到期|套餐|\\d+\\s?(GB|TB|MB)|Days?\\s?Left)).*(?i)(great\\s?britain|britain|英国|uk|🇬🇧).*" }
  - { name: 🇩🇪DE-AUTO, type: url-test, url: "http://www.google.com/generate_204", interval: 600, tolerance: 80, include-all: true, filter: "^(?!.*(Traffic|Expire|过期|流量|剩余|重置|到期|套餐|\\d+\\s?(GB|TB|MB)|Days?\\s?Left)).*(?i)(germany|德国|de|🇩🇪).*" }
  - { name: 🇫🇷FR-AUTO, type: url-test, url: "http://www.google.com/generate_204", interval: 600, tolerance: 80, include-all: true, filter: "^(?!.*(Traffic|Expire|过期|流量|剩余|重置|到期|套餐|\\d+\\s?(GB|TB|MB)|Days?\\s?Left)).*(?i)(france|法国|fr|🇫🇷).*" }
  - { name: OTHER-AUTO, type: url-test, url: "http://www.google.com/generate_204", interval: 600, tolerance: 80, include-all: true, filter: "^(?!.*(Traffic|Expire|过期|流量|剩余|重置|到期|套餐|\\d+\\s?(GB|TB|MB)|Days?\\s?Left)).*(?i)(?!.*(hong\\s?kong|香港|hk|🇭🇰|taiwan|台湾|tw|🇹🇼|singapore|新加坡|狮城|sg|🇸🇬|japan|日本|jp|🇯🇵|united\\s?states|美国|us|🇺🇸|korea|韩国|south\\s?korea|kr|🇰🇷|canada|加拿大|ca|🇨🇦|great\\s?britain|britain|英国|uk|🇬🇧|germany|德国|de|🇩🇪|france|法国|fr|🇫🇷|australia|澳大利亚|澳洲|au|🇦🇺|russia|俄罗斯|ru|🇷🇺|netherlands|荷兰|nl|🇳🇱|india|印度|in|🇮🇳)).*" }

# ※※※※※※※※※※※※※※※ 规则匹配（除直连外默认fallback） ※※※※※※※※※※※※※※※
rules:
  - RULE-SET,private_ip,DIRECT,no-resolve
  - RULE-SET,private_domain,DIRECT
  - RULE-SET,cn_domain,DIRECT
  - RULE-SET,cn_ip,DIRECT,no-resolve
  - RULE-SET,apple_ip,DIRECT,no-resolve
  - RULE-SET,appletv_domain,DIRECT
  - RULE-SET,apple_domain,DIRECT
  - RULE-SET,speedtest_domain,PROXY
