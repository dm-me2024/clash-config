# ================= 规则（按脚本替换） =================
rules:
  - RULE-SET,APP-DIRECT,DIRECT
  - RULE-SET,DO-DIRECT,DIRECT
  - RULE-SET,APPLE-DIRECT,DIRECT
  - RULE-SET,DO-PROXY,PROXY
  - GEOIP,LAN,DIRECT
  - GEOIP,CN,DIRECT
  - MATCH,PROXY

# ================= 规则来源（按脚本替换） =================
rule-providers:
  DO-DIRECT:
    type: http
    behavior: domain
    format: text
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/direct.txt"
    interval: 86400

  DO-PROXY:
    type: http
    behavior: domain
    format: text
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/proxy.txt"
    interval: 86400

  APPLE-DIRECT:
    type: http
    behavior: domain
    format: yaml
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/apple.txt"
    interval: 86400

  APP-DIRECT:
    type: http
    behavior: classical
    format: yaml
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/applications.txt"
    interval: 86400
